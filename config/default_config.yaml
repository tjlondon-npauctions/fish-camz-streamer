# Fish Camz Default Configuration
# This file is copied to data/config.yaml on first run.
# Edit via the web UI at http://<pi-ip>:8080 or manually.

vessel:
  name: ""                    # e.g. "FV Pacific Dawn"

camera:
  rtsp_url: ""                # e.g. rtsp://192.168.1.100:554/stream1
  username: ""
  password: ""
  transport: "tcp"            # tcp (recommended) or udp

output:
  mode: "rtmp"                # "rtmp", "hls", or "both" (RTMP + HLS simultaneously)

cloudflare:
  rtmps_url: "rtmps://live.cloudflare.com:443/live/"
  stream_key: ""

hls:
  segment_duration: 6         # seconds per .ts segment
  playlist_size: 10           # segments in rolling playlist (60s window)
  segment_dir: "/app/data/hls" # SD card for buffer persistence (not tmpfs)
  buffer_segments: 150        # keep 150 segments on disk (~15 min at 6s each)

bunny:
  storage_zone: ""            # Bunny Storage zone name
  api_key: ""                 # Bunny Storage API key
  region: ""                  # Storage region (empty=default, or: ny, la, sg, syd, etc.)
  cdn_url: ""                 # Pull zone URL e.g. https://fish-camz.b-cdn.net
  stream_path: "live"         # subfolder on CDN

encoding:
  mode: "auto"                # auto (copy if possible), copy, transcode
  video_bitrate: "2500k"
  max_video_bitrate: "3000k"
  buffer_size: "5000k"
  resolution: "source"        # "source" or e.g. "1280x720"
  framerate: "source"         # "source" or e.g. 30
  keyframe_interval: 2        # seconds (Cloudflare recommends 2)
  audio_bitrate: "128k"
  preset: "veryfast"          # libx264 preset: ultrafast, veryfast, fast, medium

stream:
  auto_start: true            # start streaming on boot if config is complete
  restart_delay: 5            # seconds before first auto-restart attempt
  max_restart_delay: 120      # cap for exponential backoff
  stable_threshold: 60        # seconds of stable streaming to reset backoff
  stall_timeout: 30           # seconds of no frames before declaring stall

network:
  check_interval: 30          # seconds between connectivity checks
  check_host: "1.1.1.1"
  outage_threshold: 60        # seconds before declaring extended outage

web:
  host: "0.0.0.0"
  port: 8080
  username: ""                # empty = first-run setup required
  password_hash: ""
  secret_key: ""              # auto-generated on first run

gps:
  enabled: false              # enable GPS tracking (requires USB GPS dongle + gpsd)
  gpsd_host: "localhost"      # gpsd daemon host
  gpsd_port: 2947             # gpsd daemon port
  poll_interval: 5            # seconds between GPS polls

backend:
  url: ""                     # Fishcamz backend e.g. https://fishcamz.com
  vessel_api_key: ""          # shared secret for vessel authentication
  heartbeat_interval: 60      # seconds between heartbeats

remote_access:
  enabled: false
  tunnel_token: ""            # from Cloudflare Zero Trust dashboard

system:
  log_level: "INFO"
  state_dir: "/run/rpie"      # tmpfs for volatile state